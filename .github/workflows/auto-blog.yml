name: Auto Blog Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate Blog
        run: |
          topics=("AI Tools for Startups" "Instagram Marketing Strategies" "Business Growth Strategies" "Digital Marketing Trends 2026" "Lead Generation Tips")
      
          topic=$(printf "%s\n" "${topics[@]}" | shuf -n 1)
      
          title="Ultimate Guide to $topic"
          slug=$(echo "$topic" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          folder="blog/$slug-$(date +%s)"
      
          mkdir -p "$folder"
      
          # RANDOM CONTENT VARIATION
          intros=(
            "$topic is changing how businesses grow in today's digital world."
            "In 2026, $topic is becoming essential for business success."
            "If you want growth, understanding $topic is no longer optional."
          )
      
          strategies=(
            "Focus on customer behavior and data insights."
            "Use automation tools to scale faster."
            "Create consistent and engaging content."
          )
      
          intro=$(printf "%s\n" "${intros[@]}" | shuf -n 1)
          strat1=$(printf "%s\n" "${strategies[@]}" | shuf -n 1)
          strat2=$(printf "%s\n" "${strategies[@]}" | shuf -n 1)
      
          echo "<!DOCTYPE html>" > "$folder/index.html"
          echo "<html><head><title>$title</title>" >> "$folder/index.html"
          echo "<meta name='description' content='Learn $topic with actionable strategies to grow your business.'>" >> "$folder/index.html"
          echo "</head><body style='font-family:Arial;max-width:800px;margin:auto;padding:40px;'>" >> "$folder/index.html"
      
          echo "<h1>$title</h1>" >> "$folder/index.html"
      
          echo "<p>$intro</p>" >> "$folder/index.html"
      
          echo "<h2>Why $topic Matters</h2>" >> "$folder/index.html"
          echo "<p>$topic helps businesses increase visibility, improve engagement, and drive conversions.</p>" >> "$folder/index.html"
      
          echo "<h2>Top Strategies</h2>" >> "$folder/index.html"
          echo "<ul>" >> "$folder/index.html"
          echo "<li>$strat1</li>" >> "$folder/index.html"
          echo "<li>$strat2</li>" >> "$folder/index.html"
          echo "<li>Track performance and optimize regularly.</li>" >> "$folder/index.html"
          echo "</ul>" >> "$folder/index.html"
      
          echo "<h2>Conclusion</h2>" >> "$folder/index.html"
          echo "<p>Start applying these ideas today and stay ahead in the digital market.</p>" >> "$folder/index.html"
      
          echo "<br><a href='/blog/'>← Back to Blogs</a>" >> "$folder/index.html"
          echo "</body></html>" >> "$folder/index.html"
