name: Auto Blog Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Blog topic (leave empty for auto-pick from topics.txt)'
        required: false
        default: ''
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours — 12am, 4am, 8am, 12pm, 4pm, 8pm UTC

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Blog Post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MANUAL_TOPIC: ${{ github.event.inputs.topic }}
        run: python generate_blog.py

      - name: Commit and Push
        run: |
          git config user.name "Minds Of Brands Bot"
          git config user.email "bot@mindsofbrands.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto blog: $(date +'%Y-%m-%d %H:%M')"
          git push
