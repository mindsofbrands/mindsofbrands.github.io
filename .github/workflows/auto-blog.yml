name: Auto Blog Generator

on:
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
            persist-credentials: true

      - name: Generate Blog
        run: |
          mkdir -p blog/test-blog
          echo "<h1>It Works</h1>" > blog/test-blog/index.html

      - name: Commit & Push
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git commit -m "Test blog" || echo "No changes"
          git push
