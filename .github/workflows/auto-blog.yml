name: Auto Blog Generator

on:
  schedule:
    - cron: '0 0 * * 1,3,5'      # runs every 48 hours
  workflow_dispatch:       # manual run button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Generate Blog
        run: |
          slug="auto-blog-$(date +%s)"
          
          folder="blog/$slug"

          mkdir -p $folder

           topics=("AI Tools for Startups" "Instagram Marketing Strategies" "Best Free Tools for Business Growth" "How to Start an Online Business" "Digital Marketing Trends 2026")
             tools=("ChatGPT" "Canva" "Notion" "Grammarly" "Ubersuggest" "Pictory")

             topic=$(shuf -n 1 <<< "${topics[*]}")
              tool1=$(shuf -n 1 <<< "${tools[*]}")
              tool2=$(shuf -n 1 <<< "${tools[*]}")
               tool3=$(shuf -n 1 <<< "${tools[*]}")
                       title="Top Strategies for $topic in 2026"

                   slug=$(echo "$topic" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
                   folder="blog/$slug-$(date +%s)"

                   mkdir -p $folder

                 cat <<EOF > $folder/index.html
                <!DOCTYPE html>
            <html>
            <head>
          <title>$title | Minds Of Brands</title>
            <meta name="description" content="Learn $topic and grow your business with powerful strategies.">
            </head>
             <body style="font-family:Arial; max-width:800px; margin:auto;">

                <h1>$title</h1>

                   <p><strong>Want to grow faster in 2026?</strong></p>

           <p>This guide on $topic will help you understand how to scale your business using modern strategies.</p>

                 <h2>Top Tools to Use</h2>
                 <ul>
            <li>$tool1</li>
          <li>$tool2</li>
           <li>$tool3</li>
           </ul>

           <h2>How to Apply This</h2>
           <p>Start small, test strategies, and scale using these tools.</p>

              <h2>Conclusion</h2>
                <p>$topic is one of the biggest opportunities right now. Start early and stay consistent.</p>
                
                       <h2>FAQs</h2>
                <h3>Is this beginner friendly?</h3>
              <p>Yes, anyone can start with basic knowledge.</p>

                  <h3>Do I need investment?</h3>
                        <p>No, many tools are free.</p>

                         </body>
                        </html>
                         EOF
                        </html>
                           EOF
      - name: Commit & Push
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git commit -m "Auto blog generated"
          git push
