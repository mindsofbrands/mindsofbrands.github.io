name: Auto Blog Generator
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Blog topic (leave empty for auto-pick from topics.txt)'
        required: false
        default: ''
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Debug - Check secret exists
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ GEMINI_API_KEY is EMPTY - secret not reaching workflow"
            echo "Go to: Settings → Secrets and variables → Actions"
            echo "Make sure secret name is exactly: GEMINI_API_KEY"
            exit 1
          else
            KEY_LEN=${#GEMINI_API_KEY}
            echo "✅ GEMINI_API_KEY is SET (length: $KEY_LEN chars)"
          fi

      - name: Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MANUAL_TOPIC: ${{ github.event.inputs.topic }}
        run: python generate_blog.py

      - name: Commit and Push
        run: |
          git config user.name "Minds Of Brands Bot"
          git config user.email "bot@mindsofbrands.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto blog: $(date +'%Y-%m-%d')"
          git push
