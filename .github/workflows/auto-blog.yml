name: Auto Blog Generator

on:
  schedule:
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Generate Blog
        run: |

          topics=("AI Tools for Startups" "Instagram Marketing Strategies" "Best Free Tools for Business Growth" "How to Start an Online Business" "Digital Marketing Trends 2026")
          tools=("ChatGPT" "Canva" "Notion" "Grammarly" "Ubersuggest" "Pictory")

          topic=$(shuf -n 1 <<< "${topics[*]}")
          tool1=$(shuf -n 1 <<< "${tools[*]}")
          tool2=$(shuf -n 1 <<< "${tools[*]}")
          tool3=$(shuf -n 1 <<< "${tools[*]}")

          title="Top Strategies for $topic in 2026"
          slug=$(echo "$topic" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          folder="blog/$slug-$(date +%s)"

          mkdir -p $folder

          # decide if this blog gets PDF
          has_pdf=$((RANDOM % 2))

          cat <<EOF > $folder/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>$title</title>

          <meta name="description" content="Explore $title and discover powerful digital marketing strategies, tools, and insights to grow your business online.">

          <style>
          body {
          font-family: Arial;
          background:#000;
          color:#fff;
          padding:40px;
          max-width:900px;
          margin:auto;
          }

           .blog-container {
            background:#111;
            padding:25px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
            }

          h1 {
          margin-bottom:20px;
          }

          h2 {
          margin-top:30px;
          color:#0ff;
          }

          ul {
          margin-left:20px;
          }

          a.button {
          display:inline-block;
          margin-top:15px;
          padding:10px 20px;
          background:linear-gradient(90deg,#00f,#0ff);
          color:#000;
          text-decoration:none;
          border-radius:6px;
          font-weight:bold;
          }
          </style>

          </head>

          <body>

          <div class="blog-container">

          <img src="https://source.unsplash.com/800x400/?$topic,digital-marketing" 
          style="width:100%; border-radius:10px; margin-bottom:20px;">

          <h1>$title</h1>

          <p>This blog explores <strong>$topic</strong> and how it helps businesses grow using smart digital marketing strategies.</p>

          <h2>🚀 Top Tools You Should Know</h2>
          <ul>
          <li>$tool1</li>
          <li>$tool2</li>
          <li>$tool3</li>
          </ul>
          
          <h2>📈 Why This Matters</h2>
          <p>Using the right tools and strategies can significantly improve your business performance, brand visibility, and customer engagement.</p>
          
          <h2>✅ Conclusion</h2>
          <p>Start implementing these tools today and stay ahead in the digital marketing game.</p>
          
          EOF

          # CONDITIONAL PDF SECTION
          if [ $has_pdf -eq 1 ]; then
          cat <<EOF >> $folder/index.html

          <hr>
          
          <h2>📄 Free Resource</h2>
          <p>Download detailed guide:</p>
          <a href="./guide.txt" class="button">Download Full Guide</a>
          
          EOF

          # create downloadable file
          cat <<EOF > $folder/guide.txt
          $title
          
          Detailed Guide on $topic
          
          Top Tools:
          - $tool1
          - $tool2
          - $tool3
          
          Insights:
          Use these tools to grow your business effectively.
          
          EOF
                    fi

          # FINAL SECTION
          cat <<EOF >> $folder/index.html

          <hr style="margin:40px 0;">
          
          <h2>🔥 Related Blogs</h2>
          <a href="/blog/" class="button">Explore More Blogs</a>
          
          </div>
          
          </body>
          </html>
          EOF

      - name: Commit & Push
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git commit -m "Auto blog generated"
          git push
