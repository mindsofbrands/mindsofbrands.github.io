name: Auto Blog Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Blog topic (leave empty for auto-pick from topics.txt)'
        required: false
        default: ''
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 9am UTC — remove this line to disable auto-posting

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MANUAL_TOPIC: ${{ github.event.inputs.topic }}
        run: python generate_blog.py

      - name: Commit and Push
        run: |
          git config user.name "Minds Of Brands Bot"
          git config user.email "bot@mindsofbrands.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto blog: $(date +'%Y-%m-%d')"
          git push
